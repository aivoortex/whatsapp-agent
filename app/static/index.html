<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Onboarding</title><style>:root{font-family:system-ui;color:#12221c;background:#edf4f0}*{box-sizing:border-box}.wrap{max-width:850px;margin:40px auto;padding:20px}.card{background:white;padding:28px;border-radius:18px}form{display:grid;grid-template-columns:1fr 1fr;gap:16px}.full{grid-column:1/-1}label{display:grid;gap:6px;font-weight:600}input,select,textarea,button{padding:12px;border:1px solid #bdcec4;border-radius:9px;font:inherit}textarea{min-height:85px}button{background:#19714e;color:#fff;font-weight:700}.status{padding:12px;display:none}.ok,.error{display:block}.ok{background:#def7e9}.error{background:#fde4e2}@media(max-width:600px){form{grid-template-columns:1fr}.full{grid-column:auto}}</style></head><body><main class="wrap"><h1>Prepare seu agente.</h1><p>O site fornece conhecimento; o onboarding define como agir.</p><section class="card"><form id="form"><label>ID<input name="tenant_id" pattern="[a-z0-9][a-z0-9_-]{2,49}" required></label><label>Empresa<input name="business_name" required></label><label>Nicho<select name="niche" id="niche"></select></label><label>Nome do agente<input name="assistant_name" value="Assistente"></label><label class="full">Website<input name="website_url" type="url"></label><label class="full">Objetivo<textarea name="objective" required></textarea></label><label>Tom<input name="tone" value="profissional, claro e cordial"></label><label>Contato humano<input name="human_handoff_contact"></label><label class="full">Assuntos para humano, separados por vírgula<input name="forbidden_topics"></label><label class="full">Instruções<textarea name="custom_instructions"></textarea></label><div class="full status" id="status"></div><button class="full">Criar agente</button></form></section></main><script>const f=document.querySelector('#form'),s=document.querySelector('#status'),n=document.querySelector('#niche');fetch('/v1/niches').then(r=>r.json()).then(a=>n.innerHTML=a.map(x=>`<option value="${x.slug}">${x.name}</option>`).join(''));f.onsubmit=async e=>{e.preventDefault();let raw=Object.fromEntries(new FormData(f)),p={...raw,website_url:raw.website_url||null,forbidden_topics:raw.forbidden_topics.split(',').map(x=>x.trim()).filter(Boolean),business_hours:{timezone:'America/Sao_Paulo',schedule:{}},metadata:{}};try{let r=await fetch('/v1/tenants',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)});if(!r.ok)throw Error(JSON.stringify(await r.json()));let t=await r.json(),count=0;if(p.website_url){r=await fetch(`/v1/tenants/${t.tenant_id}/knowledge/sync`,{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});if(!r.ok)throw Error(JSON.stringify(await r.json()));count=(await r.json()).documents_imported}s.className='full status ok';s.textContent=`Agente criado; ${count} página(s) importada(s).`;}catch(x){s.className='full status error';s.textContent=x.message}};</script></body></html>
